name: Deployement to staging
on:
    push:
        branches:
            - main
jobs:
    test: 
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: install dependencies
              run: npm i
            - name: run test
              run: npm run test
    build-and-push:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: build docker image
              run: docker build -t oumaymasfaxi/backend-session16 .
            - name: list images
              run: docker images 
            - name: docker login
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

